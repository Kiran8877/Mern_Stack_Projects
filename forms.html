<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Form</title>
</head>
<body>
    <form>
        <label for="Name">Name:</label>
        <input type="text" name="name" id="Name">
        <br><br>

        <label for="email">Email:</label>
        <input type="email" name="email" id="email">
        <br><br>

        <label for="phone">Phone Number:</label>
        <input type="number" name="phone" id="phone">
        <br><br>

        <input type="radio" name="gender" id="male">
        <label for="male">male</label>
        <input type="radio" name="gender" id="female">
        <label for="female">female</label>
        <input type="radio" name="gender" id="other">
        <label for="other">other</label>
        <br><br>

        <h1>Skills</h1>
        <input type="checkbox" name="skills" id="html">
        <label for="html">Html</label>
        <input type="checkbox" name="skills" id="css">
        <label for="css">css</label>
        <input type="checkbox" name="skills" id="javascript">
        <label for="javascript">javascript</label>
        <input type="checkbox" name="skills" id="cpp">
        <label for="cpp">c++</label>
        <br><br>

        <label for="exp">Experience:</label>
        <input type="number" name="exp" id="exp">
        <br><br>

        <select name="city">
            <option value="delhi">Delhi</option>
            <option value="mumbai">Mumbai</option>
            <option value="chennai">Chennai</option>
        </select>
        <br><br>
         
        <label for="about">Tell us about yourself</label>
        <input type="text" name="about" id="about">
        <br><br>
        <label for="resume">Resume</label>
        <input type="file" name="res" id="resume">
        <br><br>

        <button>submit</button>
    </form>
</body>
</html>
